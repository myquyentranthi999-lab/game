<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Flip Game</title>
    <style>
        /* CSS Reset & Basic Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            color: #333;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* Stats & Controls */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* CSS Grid Layout: Responsive */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* Mobile: 2 cột */
            gap: 15px;
            perspective: 1000px;
            /* Bắt buộc để tạo hiệu ứng 3D */
        }

        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                /* Desktop: 4 cột */
            }
        }

        /* CSS 3D Flip Animation */
        .card {
            width: 100%;
            aspect-ratio: 3/4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card:hover:not(.flip) {
            transform: scale(1.03);
            /* Hover effect */
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            /* Ẩn mặt sau khi lật */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            /* Mặt trước chứa hình, ban đầu úp xuống */
        }

        .card-back {
            background-color: #2c3e50;
            color: white;
            font-size: 2.5rem;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.05) 10px, rgba(255, 255, 255, 0.05) 20px);
        }

        /* Win Message Overlay */
        #win-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 10;
        }

        #win-message h2 {
            margin-bottom: 10px;
            color: #27ae60;
        }

        #win-message p {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <main class="game-container">
        <h1>Game Ghép Đôi Thẻ</h1>

        <div class="stats">
            <p>Số lượt: <span id="moves">0</span></p>
            <button id="restart-btn">Chơi Lại</button>
        </div>

        <div class="grid" id="game-board">
        </div>

        <div id="win-message" class="hidden">
            <h2>🎉 Chúc mừng! Bạn đã thắng! 🎉</h2>
            <p>Tổng số lượt click: <span id="final-moves">0</span></p>
            <button id="play-again-btn">Chơi Lại Ngay</button>
        </div>
    </main>

    <script>
        const board = document.getElementById('game-board');
        const movesEl = document.getElementById('moves');
        const winMessage = document.getElementById('win-message');
        const finalMovesEl = document.getElementById('final-moves');
        const restartBtn = document.getElementById('restart-btn');
        const playAgainBtn = document.getElementById('play-again-btn');

        // Mảng chứa 4 cặp biểu tượng (8 thẻ)
        const items = ['🐶', '🐱', '🦊', '🐻'];
        let cards = [...items, ...items]; // Nhân đôi để tạo thành cặp

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function initGame() {
            board.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesEl.innerText = moves;
            winMessage.classList.add('hidden');

            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;

            // Shuffle cards (Thuật toán Fisher-Yates rút gọn)
            cards.sort(() => 0.5 - Math.random());

            // Tạo thẻ và đưa vào DOM
            cards.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.item = item;

                card.innerHTML = `
                    <div class="card-face card-front">${item}</div>
                    <div class="card-face card-back">?</div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            // Click lần 1
            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Click lần 2
            secondCard = this;
            moves++;
            movesEl.innerText = moves;

            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.item === secondCard.dataset.item;
            isMatch ? disableCards() : unflipCards();
        }

        // Khớp thẻ -> Vô hiệu hóa click
        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;

            if (matchedPairs === 4) { // 4 cặp là thắng
                setTimeout(() => {
                    finalMovesEl.innerText = moves;
                    winMessage.classList.remove('hidden');
                }, 500);
            }
            resetBoard();
        }

        // Không khớp -> Úp thẻ lại
        function unflipCards() {
            lockBoard = true; // Khóa bảng để không bị lật thêm thẻ thứ 3
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        restartBtn.addEventListener('click', initGame);
        playAgainBtn.addEventListener('click', initGame);

        // Bắt đầu game khi load
        initGame();
    </script>
</body>

</html>
